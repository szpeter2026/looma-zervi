{% extends "base.html" %}
{% block title %}文档管理 - Looma{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📄 文档管理</h1>
    <p class="subtitle">上传、导入、管理知识库文档</p>
</div>

<div class="card">
    <div class="card-header">
        <h2>📥 导入文档</h2>
    </div>
    <div class="card-body">
        <!-- 模式切换 -->
        <div class="import-tabs">
            <button class="import-tab active" onclick="switchImportMode('upload')" id="tab-upload">📤 文件上传</button>
            <button class="import-tab" onclick="switchImportMode('scan')" id="tab-scan">📂 目录扫描</button>
        </div>

        <!-- 文件上传模式 -->
        <div id="mode-upload" class="import-mode">
            <div class="import-area" id="import-area"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                <div class="import-icon">📂</div>
                <p>点击选择文件或拖拽文件到此处</p>
                <p class="import-hint">支持 .md / .pdf / .txt / .docx / .csv</p>
                <input type="file" id="file-input" multiple
                       accept=".md,.txt,.pdf,.docx,.csv"
                       style="display:none" onchange="handleFileSelect(event)" />
            </div>
            <div id="file-list" class="file-list" style="display:none;"></div>
            <div class="import-actions">
                <button class="btn btn-primary" onclick="uploadFiles()" id="btn-upload">
                    🚀 上传并导入 (<span id="upload-count">0</span>)
                </button>
                <button class="btn btn-secondary" onclick="clearFiles()">清空</button>
            </div>
        </div>

        <!-- 目录扫描模式 -->
        <div id="mode-scan" class="import-mode" style="display:none;">
            <div class="import-area" onclick="triggerImport()">
                <div class="import-icon">📂</div>
                <p>扫描服务器本地目录</p>
                <p class="import-hint">输入目录路径进行批量导入</p>
            </div>
            <div class="import-actions">
                <button class="btn btn-primary" onclick="importDocuments()">🚀 开始导入</button>
                <label class="import-path">
                    <span>路径：</span>
                    <input type="text" id="import-path" placeholder="knowledge_base/documents/" />
                </label>
                <label class="import-path" style="margin-left:12px;">
                    <span>范围：</span>
                    <select id="import-scope" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;">
                        <option value="public">公开</option>
                        <option value="private">私有</option>
                    </select>
                </label>
            </div>
        </div>

        <div id="import-progress" class="progress-bar" style="display:none;">
            <div class="progress-fill"></div>
            <span class="progress-text"></span>
        </div>
        <div id="import-result"></div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h2>📋 文档列表</h2>
        <div class="filter-bar">
            <select id="scope-filter" onchange="loadDocuments()">
                <option value="">全部范围</option>
                <option value="public">公开</option>
                <option value="private">私有</option>
            </select>
            <button class="btn btn-sm" onclick="loadDocuments()">🔄 刷新</button>
        </div>
    </div>
    <div class="card-body">
        <div id="documents-loading">加载中...</div>
        <table class="data-table" id="documents-table" style="display:none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>标题</th>
                    <th>类型</th>
                    <th>范围</th>
                    <th>分块数</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="documents-tbody"></tbody>
        </table>
        <div id="documents-empty" class="empty-state" style="display:none;">
            <p>📭 暂无文档，请先导入</p>
        </div>
    </div>
</div>

<script>
let selectedFiles = [];
let currentImportMode = 'upload';

/* ===== 模式切换 ===== */
function switchImportMode(mode) {
    currentImportMode = mode;
    document.getElementById('tab-upload').classList.toggle('active', mode === 'upload');
    document.getElementById('tab-scan').classList.toggle('active', mode === 'scan');
    document.getElementById('mode-upload').style.display = mode === 'upload' ? 'block' : 'none';
    document.getElementById('mode-scan').style.display = mode === 'scan' ? 'block' : 'none';
    document.getElementById('import-result').innerHTML = '';
}

/* ===== 文件上传 ===== */
const importArea = document.getElementById('import-area');
importArea.addEventListener('click', () => document.getElementById('file-input').click());

function handleDragOver(e) { e.preventDefault(); importArea.classList.add('drag-over'); }
function handleDragLeave(e) { e.preventDefault(); importArea.classList.remove('drag-over'); }
function handleDrop(e) {
    e.preventDefault();
    importArea.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter(f => isSupported(f.name));
    addFiles(files);
}
function handleFileSelect(e) {
    const files = Array.from(e.target.files).filter(f => isSupported(f.name));
    addFiles(files);
}
function isSupported(name) {
    const ext = name.split('.').pop().toLowerCase();
    return ['md','txt','pdf','docx','csv'].includes(ext);
}
function addFiles(files) {
    for (const f of files) {
        if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
            selectedFiles.push(f);
        }
    }
    renderFileList();
}
function renderFileList() {
    const list = document.getElementById('file-list');
    document.getElementById('upload-count').textContent = selectedFiles.length;
    if (!selectedFiles.length) { list.style.display = 'none'; return; }
    list.innerHTML = selectedFiles.map((f, i) => `
        <div class="file-item">
            <span class="file-name">${escapeHtml(f.name)}</span>
            <span class="file-size">${formatSize(f.size)}</span>
            <button class="btn btn-sm btn-danger" onclick="removeFile(${i})">✕</button>
        </div>
    `).join('');
    list.style.display = 'block';
}
function removeFile(idx) { selectedFiles.splice(idx, 1); renderFileList(); }
function clearFiles() { selectedFiles = []; document.getElementById('file-input').value = ''; renderFileList(); }

/* ===== 文件上传提交 (小文件直传 /v1/documents/import) ===== */
async function uploadFiles() {
    if (!selectedFiles.length) {
        document.getElementById('import-result').innerHTML = '<div class="error">请先选择文件</div>';
        return;
    }
    const progressDiv = document.getElementById('import-progress');
    const resultDiv = document.getElementById('import-result');
    progressDiv.style.display = 'block';
    progressDiv.querySelector('.progress-text').textContent = '正在上传并解析...';
    resultDiv.innerHTML = '';

    const formData = new FormData();
    for (const f of selectedFiles) {
        formData.append('files', f);
    }
    const token = getToken();

    try {
        const res = await fetch('/v1/documents/import', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + (token || 'stub') },
            body: formData
        });
        progressDiv.style.display = 'none';
        if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.message || errData.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        resultDiv.innerHTML = `<div class="import-summary">
            <span class="badge badge-green">✅ 任务已提交</span>
            <span style="font-size:13px;color:#64748B;">task_id: ${data.task_id || '-'}, 预计 ${data.estimated_seconds || 0}s</span>
        </div>`;
        selectedFiles = [];
        renderFileList();
        loadDocuments();
    } catch(err) {
        progressDiv.style.display = 'none';
        resultDiv.innerHTML = `<div class="error">❌ ${escapeHtml(err.message)}</div>`;
    }
}

/* ===== 目录扫描导入 ===== */
function triggerImport() { document.getElementById('import-path').focus(); }

async function importDocuments() {
    const path = document.getElementById('import-path').value.trim() || null;
    const scope = document.getElementById('import-scope').value;
    const progressDiv = document.getElementById('import-progress');
    const resultDiv = document.getElementById('import-result');
    progressDiv.style.display = 'block';
    progressDiv.querySelector('.progress-text').textContent = '正在导入...';
    resultDiv.innerHTML = '';

    try {
        const data = await apiPost('/v1/documents/import', {
            directory: path,
            scope: scope
        });
        progressDiv.style.display = 'none';
        resultDiv.innerHTML = `<div class="import-summary">
            <span class="badge badge-green">✅ 任务已提交</span>
            <span style="font-size:13px;color:#64748B;">task_id: ${data.task_id || '-'}</span>
        </div>`;
        loadDocuments();
    } catch(err) {
        progressDiv.style.display = 'none';
        resultDiv.innerHTML = `<div class="error">❌ ${escapeHtml(err.message)}</div>`;
    }
}

/* ===== 文档列表 ===== */
async function loadDocuments() {
    const scope = document.getElementById('scope-filter').value;
    const params = new URLSearchParams();
    if (scope) params.set('scope', scope);
    params.set('limit', '50');

    try {
        const docs = await apiGet('/v1/documents?' + params.toString());
        document.getElementById('documents-loading').style.display = 'none';
        const table = document.getElementById('documents-table');
        const empty = document.getElementById('documents-empty');
        const tbody = document.getElementById('documents-tbody');

        if (!docs || !docs.length) {
            table.style.display = 'none';
            empty.style.display = 'block';
            return;
        }
        table.style.display = 'table';
        empty.style.display = 'none';
        tbody.innerHTML = docs.map(d => `
            <tr>
                <td style="font-size:12px;color:#999;">${d.id}</td>
                <td class="doc-title">${escapeHtml(d.title || d.file_name || '-')}</td>
                <td><span class="doc-type doc-type-${(d.file_type || 'md').toLowerCase()}">${d.file_type || 'md'}</span></td>
                <td><span class="badge">${d.scope || 'public'}</span></td>
                <td>${d.chunk_count || '-'}</td>
                <td>${(d.created_at || '').slice(0, 10)}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteDocument('${d.id}')">🗑</button>
                </td>
            </tr>
        `).join('');
    } catch(err) {
        document.getElementById('documents-loading').textContent = '加载失败: ' + err.message;
    }
}

async function deleteDocument(id) {
    if (!confirm('确认删除该文档及其所有分块和向量数据？')) return;
    try {
        await apiDelete(`/v1/documents/${id}`);
        loadDocuments();
    } catch(err) {
        alert('删除失败: ' + err.message);
    }
}

loadDocuments();
</script>
{% endblock %}
