# Overseas (Vultr Singapore) Nginx config
# server_name: api.genz.ltd
# Cloudflare terminates SSL; nginx listens on :80 only
# Frontend is on Vercel (genz.ltd) — this config is API-only by default
#
# CI: deployed to /etc/nginx/sites-available/looma-zervi
# Access: https://api.genz.ltd/health  https://api.genz.ltd/v1/

# Restore real client IP from Cloudflare
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name api.genz.ltd;

    client_max_body_size 20m;

    # --- Backend API ---
    location /v1/ {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # /api/v1/... → /v1/... (rewrite for frontend code using /api prefix)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5200/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Optional: PlanetX SPA (fallback if Vercel is down) ---
    # Uncomment if you want Vultr to also serve the frontend
    # root /var/www/planetx/dist;
    # location /tspace/ {
    #     alias /var/www/saas/dist/;
    #     try_files $uri $uri/ /tspace/index.html;
    # }
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    # Default: proxy all other paths to Flask backend
    # This lets Flask's @app.route("/") return the API endpoint list,
    # and Flask's 404 handler provides helpful messages for unknown paths.
    location / {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }
}
