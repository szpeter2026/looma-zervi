events {
    worker_connections 1024;
}

http {
    upstream looma_backend {
        server backend:5200;
    }

    # ============================================
    # Overseas deployment: genz.ltd subdomain routing
    # Cloudflare proxy enabled -> nginx sees Cloudflare IPs
    # HTTPS required for all production endpoints
    # ============================================

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # Cloudflare real IP preservation (optional, for accurate logging/limits)
    # Include Cloudflare IPv4/IPv6 ranges if you want nginx to trust forwarded headers
    # set_real_ip_from 173.245.48.0/20;
    # ... (see Cloudflare IP ranges)
    # real_ip_header CF-Connecting-IP;

    # --- HTTP: redirect everything to HTTPS ---
    server {
        listen 80;
        server_name genz.ltd api.genz.ltd tspace.genz.ltd;
        return 301 https://$host$request_uri;
    }

    # ============================================
    # api.genz.ltd -> backend API only
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.genz.ltd;

        ssl_certificate /etc/letsencrypt/live/genz.ltd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/genz.ltd/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            return 404;
        }
    }

    # ============================================
    # tspace.genz.ltd -> B2B SaaS SPA
    # ============================================
    server {
        listen 443 ssl http2;
        server_name tspace.genz.ltd;

        ssl_certificate /etc/letsencrypt/live/genz.ltd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/genz.ltd/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root /var/www/saas/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ============================================
    # genz.ltd -> PlanetX B2C SPA + API fallback
    # ============================================
    server {
        listen 443 ssl http2;
        server_name genz.ltd;

        ssl_certificate /etc/letsencrypt/live/genz.ltd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/genz.ltd/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root /var/www/planetx/dist;
        index index.html;

        # API fallback (keeps existing /v1/ routes working on apex domain)
        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
