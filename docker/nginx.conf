events {
    worker_connections 1024;
}

http {
    server_tokens off;
    # ============================================
    # Upstream: Flask backend (Docker port mapped to host)
    # ============================================
    upstream looma_backend {
        server 127.0.0.1:5200;
    }

    # ============================================
    # Rate limiting zones
    # ============================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # ============================================
    # HTTP: per-host routing (Cloudflare Flexible → port 80)
    # ============================================

    # api.genz.ltd — API only (no static SPA fallback)
    server {
        listen 80;
        server_name api.genz.ltd;

        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"Use /v1/ endpoints"}';
        }
    }

    # genz.ltd / www — marketing static (VPS fallback if not on Vercel)
    server {
        listen 80;
        server_name genz.ltd www.genz.ltd;

        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            root /var/www/genz-web;
            index index.html;
            try_files $uri $uri.html =404;
        }
    }

    # tspace.genz.ltd — B2B SPA + API proxy
    server {
        listen 80;
        server_name tspace.genz.ltd;

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            root /var/www/saas/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # Catch-all: reject unknown hosts on port 80
    server {
        listen 80 default_server;
        server_name _;

        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"Unknown host"}';
        }
    }

    # ============================================
    # HTTPS: genz.ltd + www — GenZ marketing site (genz-web) + API routes
    # ============================================
    server {
        listen 443 ssl http2;
        server_name genz.ltd www.genz.ltd;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # --- Auth endpoints (stricter rate limit) ---
        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Payment endpoints ---
        location /v1/payment/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- All other API ---
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        # --- Health check ---
        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            root /var/www/genz-web;
            index index.html;
            try_files $uri $uri.html =404;
        }
    }

    # ============================================
    # HTTPS: api.genz.ltd — pure API
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.genz.ltd;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /v1/payment/stripe/webhook {
            # Stripe webhooks: no rate limit
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"Use /v1/ endpoints"}';
        }
    }

    # ============================================
    # HTTPS: tspace.genz.ltd — T-space B2B SaaS SPA
    # ============================================
    server {
        listen 443 ssl http2;
        server_name tspace.genz.ltd;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # T-space SPA
        location / {
            root /var/www/saas/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # T-space API proxy
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
