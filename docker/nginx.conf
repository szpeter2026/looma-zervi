events {
    worker_connections 1024;
}

http {
    upstream looma_backend {
        server backend:5200;
    }

    # ============================================
    # Overseas deployment: HTTPS-ready single entry
    # For production: obtain certs via certbot/Let's Encrypt
    # and uncomment the SSL server block below.
    # ============================================

    # Rate limiting zone (overseas: per-IP throttling at nginx level)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # --- HTTP: redirect to HTTPS (production) ---
    server {
        listen 80;
        server_name _;

        # In production: redirect all HTTP to HTTPS
        # return 301 https://$host$request_uri;

        # --- Dev mode: serve directly over HTTP ---
        root /var/www/planetx/dist;
        index index.html;

        # --- Backend API with rate limiting ---
        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        # --- T-space SPA ---
        location /tspace/ {
            alias /var/www/saas/dist/;
            try_files $uri $uri/ /tspace/index.html;
        }

        # --- PlanetX SPA (fallback) ---
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # --- HTTPS server (uncomment for production with TLS certs) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
