events {
    worker_connections 1024;
}

http {
    upstream looma_backend {
        server backend:5000;
    }

    # ============================================
    # API gateway: api.genz.ltd
    # ============================================
    server {
        listen 80;
        server_name api.genz.ltd;

        # Proxy all API requests to Flask backend
        location / {
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support SSE streaming for /v1/ask
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }
    }

    # ============================================
    # PlanetX frontend: planetx.genz.ltd
    # ============================================
    server {
        listen 80;
        server_name planetx.genz.ltd;

        root /var/www/planetx/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ============================================
    # T-space frontend: t.genz.ltd
    # ============================================
    server {
        listen 80;
        server_name t.genz.ltd;

        root /var/www/saas/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
