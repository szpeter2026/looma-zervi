events {
    worker_connections 1024;
}

http {
    upstream looma_backend {
        server backend:5200;
    }

    # ============================================
    # 单入口模式（ICP 备案期间使用 IP 访问）
    # ICP 备案通过后替换 server_name 为正式域名
    # ============================================
    server {
        listen 80;
        server_name _;

        # --- Static: PlanetX SPA ---
        root /var/www/planetx/dist;
        index index.html;

        # --- Backend API ---
        location /v1/ {
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://looma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://looma_backend/health;
            access_log off;
        }

        # --- T-space SPA ---
        location /tspace/ {
            alias /var/www/saas/dist/;
            try_files $uri $uri/ /tspace/index.html;
        }

        # --- PlanetX SPA (fallback) ---
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
