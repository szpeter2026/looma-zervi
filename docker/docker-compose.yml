name: looma-zervi

services:
  # ============================================
  # Looma Backend (Flask)
  # 镜像首次手动 docker compose build，后续 CI 只重启容器加载新代码
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: looma-backend
    restart: unless-stopped
    ports:
      - "5200:5200"
    environment:
      - FLASK_PORT=5200
      # Overseas: Google OAuth + payment providers + rate limiting
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-USD}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_MODE=${PAYPAL_MODE:-sandbox}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - AIRWALLEX_API_KEY=${AIRWALLEX_API_KEY:-}
      - AIRWALLEX_CLIENT_KEY=${AIRWALLEX_CLIENT_KEY:-}
      - AIRWALLEX_MODE=${AIRWALLEX_MODE:-demo}
      - AIRWALLEX_WEBHOOK_SECRET=${AIRWALLEX_WEBHOOK_SECRET:-}
      - RATE_LIMIT_STORAGE_URI=${RATE_LIMIT_STORAGE_URI:-memory://}
      - DEPLOY_REGION=${DEPLOY_REGION:-US}
    env_file:
      - ../backend/.env
    volumes:
      # 代码 bind mount：rsync 后 restart 即生效，不需 rebuild
      - ../backend:/app
      - backend-data:/app/data
      - chroma-data:/app/chroma_data
      - poetry-data:/app/poetry_data
      - ../data/chroma_models:/root/.cache/chroma/onnx_models
    depends_on:
      - redis
    networks:
      - looma-net

  # ============================================
  # ChromaDB (Vector Database)
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: looma-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - looma-net

  # ============================================
  # Redis (overseas: rate limiting + cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: looma-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - looma-net

volumes:
  backend-data:
  chroma-data:
  poetry-data:
  redis-data:

networks:
  looma-net:
    driver: bridge
