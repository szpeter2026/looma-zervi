services:
  # ============================================
  # Looma Backend (Flask)
  # 镜像首次手动 docker compose build，后续 CI 只重启容器加载新代码
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: looma-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    volumes:
      # 代码 bind mount：rsync 后 restart 即生效，不需 rebuild
      - ../backend:/app
      - backend-data:/app/data
      - chroma-data:/app/chroma_data
      - poetry-data:/app/poetry_data
    networks:
      - looma-net

  # ============================================
  # ChromaDB (Vector Database)
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: looma-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - looma-net

volumes:
  backend-data:
  chroma-data:
  poetry-data:

networks:
  looma-net:
    driver: bridge
