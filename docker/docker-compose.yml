services:
  # ============================================
  # Looma Backend (Flask)
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: looma-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app                         # 代码 bind mount，rsync 后 restart 即生效
      - backend-data:/app/data
      - chroma-data:/app/chroma_data
    networks:
      - looma-net

  # ============================================
  # ChromaDB (Vector Database)
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: looma-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - looma-net

  # ============================================
  # Nginx (Reverse Proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: looma-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # 前端静态文件（由 CI/CD 部署到宿主机后挂载）
      - /var/www/planetx/dist:/var/www/planetx/dist:ro
      - /var/www/saas/dist:/var/www/saas/dist:ro
    depends_on:
      - backend
    networks:
      - looma-net

volumes:
  backend-data:
  chroma-data:

networks:
  looma-net:
    driver: bridge
