# 备案前 IP 内测 — 单入口（PlanetX + T空间 + API）
# CI: DEPLOY_NGINX_MODE=ip 时部署到 /etc/nginx/sites-enabled/looma-zervi
# 访问: http://<云IP>/  http://<云IP>/tspace/  http://<云IP>/health

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/planetx/dist;
    index index.html;

    client_max_body_size 20m;

    location /v1/ {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5200/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /tspace/ {
        alias /var/www/saas/dist/;
        try_files $uri $uri/ /tspace/index.html;
    }

    # Bolent 诗词门户（szbolent-portal 子路径部署）
    location /bolent/ {
        alias /var/www/szbolent-portal/dist/;
        try_files $uri $uri/ /bolent/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
