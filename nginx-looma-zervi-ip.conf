# 备案前 IP 内测 — 大陆产品入口（PlanetX + T-space + API）
# CI: DEPLOY_NGINX_MODE=ip 时部署到 /etc/nginx/sites-enabled/looma-zervi
# 访问: http://<云IP>/  http://<云IP>/tspace/  http://<云IP>/health
#
# 不包含:
#   - genz.ltd 营销站（独立仓 genz-web → Vercel）
#   - Bolent 企业站（szbolent-portal / WordPress → 阿里云独立部署）

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/planetx/dist;
    index index.html;

    client_max_body_size 20m;

    location /v1/ {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5200/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /tspace/ {
        alias /var/www/saas/dist/;
        try_files $uri $uri/ /tspace/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
