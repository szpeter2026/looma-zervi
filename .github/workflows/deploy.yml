# ============================================================
# Deploy — 合并到 main 后自动部署到腾讯云服务器
#
# 完全自举：不需要手动 SSH 到服务器，一切通过 GitHub Secrets 配置
#
# 需要的 GitHub Secrets:
#   SSH_HOST          - 腾讯云服务器 IP
#   SSH_USER          - SSH 用户名 (如 ubuntu)
#   SSH_PRIVATE_KEY   - SSH 私钥 (你本地 ~/.ssh/id_rsa 的内容)
#   DEPLOY_PATH       - 服务器项目路径 (如 /home/ubuntu/looma-zervi)
#
#   以下为应用运行时需要的环境变量（首次部署后生效）:
#   ENV_JWT_SECRET        - JWT 签名密钥
#   ENV_DEEPSEEK_API_KEY  - DeepSeek API Key
#   ENV_DEEPSEEK_BASE_URL - DeepSeek API 地址
#   ENV_ENV               - production
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ============================================
  # 前端构建
  # ============================================
  frontend-build:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build PlanetX
        run: pnpm build:planetx
        env:
          VITE_API_BASE: ""              # 同源请求，nginx 代理 /v1/ → backend
          VITE_SAAS_URL: "/tspace/"      # 按钮跳转到同域 T 空间

      - name: Build Saas (T-space)
        run: pnpm --filter @looma/saas exec vite build --base /tspace/
        env:
          VITE_API_BASE: ""              # 同源请求

      - name: Upload PlanetX artifact
        uses: actions/upload-artifact@v4
        with:
          name: planetx-dist
          path: frontend/packages/planetx/dist
          retention-days: 1

      - name: Upload Saas artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-dist
          path: frontend/packages/saas/dist
          retention-days: 1

  # ============================================
  # 后端测试
  # ============================================
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
        run: python -m pytest tests/ -v --tb=short

  # ============================================
  # 部署到服务器
  # Docker 镜像由手动部署，CI 只负责代码同步 + 容器重启
  # ============================================
  deploy:
    name: "Deploy to Server"
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: success()

    steps:
      - uses: actions/checkout@v4

      # 下载前端构建产物
      - name: Download PlanetX dist
        uses: actions/download-artifact@v4
        with:
          name: planetx-dist
          path: artifacts/planetx

      - name: Download Saas dist
        uses: actions/download-artifact@v4
        with:
          name: saas-dist
          path: artifacts/saas

      - name: List artifacts
        run: |
          echo "=== Frontend ===" && ls -lh artifacts/planetx/ artifacts/saas/ || true

      # 配置 SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # SSH 公共参数：保活 + 禁用严格主机检查（已通过 known_hosts 验证）
      - name: Setup SSH alias
        run: |
          echo 'SSH_CMD=ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=accept-new' >> $GITHUB_ENV

      # ========================================
      # Step 1: 服务器自举 — 确保目录和 .env 存在
      # ========================================
      - name: Bootstrap server
        run: |
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'BOOTSTRAP'
          set -e
          echo "=== Bootstrap server ==="
          sudo chown -R $(whoami) ${{ secrets.DEPLOY_PATH }} 2>/dev/null || true
          mkdir -p ${{ secrets.DEPLOY_PATH }}
          sudo mkdir -p /var/www/planetx/dist /var/www/saas/dist
          sudo chown -R $(whoami) /var/www/planetx /var/www/saas
          ENV_FILE="${{ secrets.DEPLOY_PATH }}/backend/.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "=== Creating backend/.env ==="
            mkdir -p "$(dirname "$ENV_FILE")"
            printf '# Auto-generated by GitHub Actions\nJWT_SECRET=%s\nDEEPSEEK_API_KEY=%s\nDEEPSEEK_BASE_URL=%s\nENV=%s\nDATABASE_PATH=/app/data/looma.db\nFLASK_ENV=production\nCHROMA_MODE=remote\nCHROMA_HOST=chromadb\nCHROMA_PORT=8000\nPOETRY_CHROMA_PATH=/app/poetry_data\n' \
              "${{ secrets.ENV_JWT_SECRET }}" \
              "${{ secrets.ENV_DEEPSEEK_API_KEY }}" \
              "${{ secrets.ENV_DEEPSEEK_BASE_URL }}" \
              "${{ secrets.ENV_ENV }}" \
              > "$ENV_FILE"
            echo "=== .env created ==="
          else
            echo "=== .env already exists, skipping ==="
          fi
          echo "=== Bootstrap done ==="
          BOOTSTRAP

      # ========================================
      # Step 2: 同步代码到服务器
      # ========================================
      - name: Sync code to server
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='data/' \
            --exclude='chroma_data/' \
            --exclude='.env' \
            --exclude='frontend/' \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      # ========================================
      # Step 2.5: 同步诗词库 ChromaDB 数据到服务器
      # 160MB 静态数据集，不在 git 中，需单独传输
      # ========================================
      - name: Sync poetry ChromaDB data
        run: |
          echo "=== Syncing poetry ChromaDB data ==="
          if [ -d "data/poetry_full" ]; then
            rsync -avz -e "$SSH_CMD" \
              data/poetry_full/ \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/data/poetry_full/
            echo "=== Poetry data synced ==="
          else
            echo "=== data/poetry_full/ not found in repo, skipping (first-time manual upload needed) ==="
          fi

      # ========================================
      # Step 2.6: 初始化 poetry-data Docker 卷
      # 首次部署时将诗词库从服务器文件系统注入 Docker 命名卷
      # ========================================
      - name: Populate poetry Docker volume
        run: |
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'POETRY_VOLUME'
          set -e
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          VOLUME_NAME="looma-zervi_poetry-data"

          # Check if volume already has data
          if docker run --rm -v ${VOLUME_NAME}:/data alpine test -f /data/chroma.sqlite3 2>/dev/null; then
            echo "=== Poetry volume already populated, skipping ==="
            exit 0
          fi

          # Check if source data exists on server
          if [ ! -d "${DEPLOY_PATH}/data/poetry_full" ]; then
            echo "=== Poetry source data not found on server, skipping volume init ==="
            exit 0
          fi

          echo "=== Populating poetry Docker volume from ${DEPLOY_PATH}/data/poetry_full ==="
          docker run --rm \
            -v ${VOLUME_NAME}:/dest \
            -v ${DEPLOY_PATH}/data/poetry_full:/src:ro \
            alpine cp -a /src/. /dest/
          echo "=== Poetry volume populated ==="
          POETRY_VOLUME

      # ========================================
      # Step 2.7: 导入诗词到 SQLite poems 表
      # 首次部署后从 ChromaDB 抽取结构化数据写入 SQLite
      # （browse/random/stats 端点依赖此表）
      # ========================================
      - name: Import poetry into SQLite
        run: |
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'POETRY_IMPORT'
          set -e
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          # Check if poems table already has data
          COUNT=$(docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml exec -T backend \
            python -c "from src.db.manager import DatabaseManager; db=DatabaseManager('/app/data/looma.db'); db.init_schema(); print(db.get_poetry_stats()['total'])" 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ] 2>/dev/null; then
            echo "=== Poems table already has ${COUNT} entries, skipping import ==="
            exit 0
          fi

          echo "=== Running poetry import (ChromaDB → SQLite) ==="
          docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml exec -T backend \
            python scripts/import_poetry.py \
              --source-dir /app/poetry_data \
              --db-path /app/data/looma.db \
              --batch-size 500
          echo "=== Poetry import complete ==="
          POETRY_IMPORT

      # ========================================
      # Step 3: 上传前端 dist
      # ========================================
      - name: Upload PlanetX dist
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            artifacts/planetx/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/planetx/dist/

      - name: Upload Saas dist
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            artifacts/saas/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/saas/dist/

      # ========================================
      # Step 4: 部署 Nginx 配置（首次/更新时）
      # ========================================
      - name: Deploy nginx config
        run: |
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo cp /etc/nginx/sites-enabled/api.genz.ltd /etc/nginx/sites-enabled/api.genz.ltd.bak.$(date +%Y%m%d%H%M%S) 2>/dev/null || true"
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo cp ${{ secrets.DEPLOY_PATH }}/nginx-looma-zervi.conf /etc/nginx/sites-enabled/looma-zervi"
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo rm -f /etc/nginx/sites-enabled/api.genz.ltd"
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo nginx -t && sudo nginx -s reload"

      # ========================================
      # Step 5: 重启 Docker 服务 + 健康检查
      # 镜像已手动部署，此处仅重启容器加载新代码
      # ========================================
      - name: Restart services & health check
        run: |
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          echo "=== Restarting backend (load new code via volume mount) ==="
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml up -d --remove-orphans && \
             docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml restart backend"

          echo "=== Health check ==="
          sleep 5
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "curl -sf http://localhost:5200/health && echo ' Backend OK' || echo ' Backend FAIL'"
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "curl -sf http://localhost/health && echo ' Nginx OK' || echo ' Nginx FAIL'"

      - name: Clean up old images
        run: |
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker image prune -f"
