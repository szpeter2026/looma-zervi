# ============================================================
# Deploy — 合并到 main 后自动部署到腾讯云服务器
#
# 完全自举：不需要手动 SSH 到服务器，一切通过 GitHub Secrets 配置
#
# 需要的 GitHub Secrets:
#   SSH_HOST          - 腾讯云服务器 IP
#   SSH_USER          - SSH 用户名 (如 ubuntu)
#   SSH_PRIVATE_KEY   - SSH 私钥 (你本地 ~/.ssh/id_rsa 的内容)
#   DEPLOY_PATH       - 服务器项目路径 (如 /home/ubuntu/looma-zervi)
#
#   以下为应用运行时需要的环境变量（首次部署后生效）:
#   ENV_JWT_SECRET        - JWT 签名密钥
#   ENV_DEEPSEEK_API_KEY  - DeepSeek API Key
#   ENV_DEEPSEEK_BASE_URL - DeepSeek API 地址
#   ENV_ENV               - production
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ============================================
  # 前端构建
  # ============================================
  frontend-build:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build PlanetX
        run: pnpm build:planetx

      - name: Build Saas (T-space)
        run: pnpm build:saas

      - name: Upload PlanetX artifact
        uses: actions/upload-artifact@v4
        with:
          name: planetx-dist
          path: frontend/packages/planetx/dist
          retention-days: 1

      - name: Upload Saas artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-dist
          path: frontend/packages/saas/dist
          retention-days: 1

  # ============================================
  # 后端测试
  # ============================================
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
        run: python -m pytest tests/ -v --tb=short

  # ============================================
  # 部署到服务器（完全自举）
  # ============================================
  deploy:
    name: "Deploy to Server"
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: success()

    steps:
      - uses: actions/checkout@v4

      # 下载前端构建产物
      - name: Download PlanetX dist
        uses: actions/download-artifact@v4
        with:
          name: planetx-dist
          path: artifacts/planetx

      - name: Download Saas dist
        uses: actions/download-artifact@v4
        with:
          name: saas-dist
          path: artifacts/saas

      # 配置 SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ========================================
      # Step 1: 服务器自举 — 确保目录和 .env 存在
      # ========================================
      - name: Bootstrap server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'BOOTSTRAP'
          set -e
          echo "=== Bootstrap server ==="
          sudo chown -R $(whoami) ${{ secrets.DEPLOY_PATH }} 2>/dev/null || true
          mkdir -p ${{ secrets.DEPLOY_PATH }}
          sudo mkdir -p /var/www/planetx/dist /var/www/saas/dist
          sudo chown -R $(whoami) /var/www/planetx /var/www/saas
          ENV_FILE="${{ secrets.DEPLOY_PATH }}/backend/.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "=== Creating backend/.env ==="
            mkdir -p "$(dirname "$ENV_FILE")"
            printf '# Auto-generated by GitHub Actions\nJWT_SECRET=%s\nDEEPSEEK_API_KEY=%s\nDEEPSEEK_BASE_URL=%s\nENV=%s\nDATABASE_PATH=/app/data/looma.db\n' \
              "${{ secrets.ENV_JWT_SECRET }}" \
              "${{ secrets.ENV_DEEPSEEK_API_KEY }}" \
              "${{ secrets.ENV_DEEPSEEK_BASE_URL }}" \
              "${{ secrets.ENV_ENV }}" \
              > "$ENV_FILE"
            echo "=== .env created ==="
          else
            echo "=== .env already exists, skipping ==="
          fi
          echo "=== Bootstrap done ==="
          BOOTSTRAP

      # ========================================
      # Step 2: 同步代码到服务器
      # ========================================
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='data/' \
            --exclude='chroma_data/' \
            --exclude='.env' \
            --exclude='frontend/' \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      # ========================================
      # Step 3: 上传前端 dist
      # ========================================
      - name: Upload PlanetX dist
        run: |
          rsync -avz --delete \
            artifacts/planetx/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/planetx/dist/

      - name: Upload Saas dist
        run: |
          rsync -avz --delete \
            artifacts/saas/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/saas/dist/

      # ========================================
      # Step 4: Docker 重建 & 健康检查
      # ========================================
      - name: Docker compose rebuild
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             docker compose -f docker/docker-compose.yml up -d --build && \
             echo '=== Waiting for services ===' && \
             sleep 5 && \
             echo '=== Health check ===' && \
             curl -sf http://localhost:5000/health && echo ' Backend OK' || echo ' Backend FAIL' && \
             curl -sf http://localhost/health && echo ' Nginx OK' || echo ' Nginx FAIL'"

      - name: Clean up old images
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker image prune -f"
