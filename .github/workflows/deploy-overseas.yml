# ============================================================
# Deploy Overseas — tag overseas-* → Vultr 新加坡（仅 tag 触发，避免与分支 push 双跑）
#
# 目标机: 139.180.184.25 · genz.ltd + tspace.genz.ltd + api.genz.ltd
#
# 触发: git tag overseas-v1.4.3 && git push github overseas-v1.4.3
#       或 Actions 页 workflow_dispatch 手动部署
# 注意: 不要同时 push release/overseas 分支 + overseas-* tag，会触发两次。
#       分支合并后只推 tag 即可；分支 push 不再触发本 workflow。
#
# Secrets 任选一组（overseas-v1.3 成功部署用的是 VULTR_*）:
#   VULTR_SSH_HOST / VULTR_SSH_USER / VULTR_SSH_PRIVATE_KEY / VULTR_JWT_SECRET
#   或 SSH_HOST_OVERSEAS / SSH_USER_OVERSEAS / SSH_PRIVATE_KEY_OVERSEAS / ENV_JWT_SECRET_SG
#
# GitHub Secrets（建议）:
#   ENV_DEEPSEEK_API_KEY / VULTR_DEEPSEEK_API_KEY
#   ENV_QCC_AUTH_TOKEN / VULTR_QCC_AUTH_TOKEN  (企查查 MCP Authorization，含 Bearer 前缀)
#   ENV_OPENAI_API_KEY
#   ENV_GOOGLE_CLIENT_ID / ENV_GOOGLE_CLIENT_SECRET
#   ENV_STRIPE_SECRET_KEY / ENV_STRIPE_WEBHOOK_SECRET
#
# Repository Variables（可选）:
#   DEPLOY_PATH_SG         - 默认 /opt/looma-zervi
# ============================================================
name: Deploy Overseas

on:
  push:
    tags:
      - 'overseas-*'
  workflow_dispatch:

concurrency:
  group: deploy-overseas
  cancel-in-progress: true

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH_SG != '' && vars.DEPLOY_PATH_SG || secrets.VULTR_DEPLOY_PATH || '/opt/looma-zervi' }}
  OVERSEAS_DOMAIN: genz.ltd
  OVERSEAS_API_HOST: api.genz.ltd

jobs:
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
          DEPLOY_REGION: SG
        run: python -m pytest tests/ -v --tb=short

  saas-build:
    name: "Build SaaS (tspace)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build overseas SaaS
        env:
          # Same-origin /v1 via tspace nginx — avoids cross-origin CORS to api.genz.ltd
          VITE_API_BASE: ""
          VITE_DEPLOY_REGION: SG
        run: pnpm --filter @looma/saas build

      - name: Upload saas dist
        uses: actions/upload-artifact@v4
        with:
          name: saas-dist
          path: frontend/packages/saas/dist
          retention-days: 1

  deploy:
    name: "Deploy to Vultr SG"
    runs-on: ubuntu-latest
    needs: [backend-test, saas-build]
    if: success()
    env:
      SSH_HOST: ${{ secrets.VULTR_SSH_HOST || secrets.SSH_HOST_OVERSEAS || secrets.SSH_HOST_SG }}
      SSH_USER: ${{ secrets.VULTR_SSH_USER || secrets.SSH_USER_OVERSEAS || secrets.SSH_USER_SG }}
      ENV_JWT_SECRET: ${{ secrets.VULTR_JWT_SECRET || secrets.ENV_JWT_SECRET_SG || secrets.ENV_JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Download saas dist
        uses: actions/download-artifact@v4
        with:
          name: saas-dist
          path: artifacts/saas

      - name: Validate SSH secrets
        env:
          KEY_VULTR: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          KEY_OVERSEAS: ${{ secrets.SSH_PRIVATE_KEY_OVERSEAS }}
          KEY_SG: ${{ secrets.SSH_PRIVATE_KEY_SG }}
          KEY_ALT: ${{ secrets.OVERSEAS_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY_VULTR" ] && [ -z "$KEY_OVERSEAS" ] && [ -z "$KEY_SG" ] && [ -z "$KEY_ALT" ]; then
            echo "::error::Missing SSH private key secret."
            echo "Add VULTR_SSH_PRIVATE_KEY (overseas-v1.3 style) or SSH_PRIVATE_KEY_OVERSEAS."
            exit 1
          fi
          if [ -z "${{ env.SSH_HOST }}" ] || [ -z "${{ env.SSH_USER }}" ]; then
            echo "::error::Missing SSH host/user."
            echo "Add VULTR_SSH_HOST=139.180.184.25 and VULTR_SSH_USER=root"
            exit 1
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY_OVERSEAS || secrets.SSH_PRIVATE_KEY_SG || secrets.OVERSEAS_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH env
        run: |
          echo 'SSH_CMD=ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=accept-new' >> $GITHUB_ENV
          echo "DEPLOY_TARGET=${{ env.SSH_USER }}@${{ env.SSH_HOST }}" >> $GITHUB_ENV

      - name: Bootstrap server
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << BOOTSTRAP
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          DOMAIN="${{ env.OVERSEAS_DOMAIN }}"
          API_HOST="${{ env.OVERSEAS_API_HOST }}"
          TSPACE_HOST="tspace.${DOMAIN}"

          echo "=== Bootstrap overseas server (DEPLOY_PATH=\${DEPLOY_PATH}) ==="
          mkdir -p "\${DEPLOY_PATH}" /var/www/genz-web /var/www/saas/dist "\${DEPLOY_PATH}/data" "\${DEPLOY_PATH}/logs" "\${DEPLOY_PATH}/data/chroma_models"

          ENV_FILE="\${DEPLOY_PATH}/backend/.env"
          mkdir -p "\$(dirname "\${ENV_FILE}")"
          if [ ! -f "\${ENV_FILE}" ]; then
            echo "=== Creating backend/.env (overseas template) ==="
            printf '%s\n' \
              '# Auto-generated by GitHub Actions (overseas)' \
              'FLASK_ENV=production' \
              'FLASK_PORT=5200' \
              "JWT_SECRET=${{ env.ENV_JWT_SECRET }}" \
              "DEEPSEEK_API_KEY=${{ secrets.VULTR_DEEPSEEK_API_KEY || secrets.ENV_DEEPSEEK_API_KEY }}" \
              'DEEPSEEK_BASE_URL=https://api.deepseek.com/v1' \
              'DEEPSEEK_MODEL=deepseek-chat' \
              "QCC_AUTH_TOKEN=${{ secrets.VULTR_QCC_AUTH_TOKEN || secrets.ENV_QCC_AUTH_TOKEN }}" \
              'QCC_ENABLED=true' \
              "OPENAI_API_KEY=${{ secrets.ENV_OPENAI_API_KEY }}" \
              'OPENAI_BASE_URL=https://api.openai.com/v1' \
              'OPENAI_MODEL=gpt-4o-mini' \
              'LLM_PROVIDER_ORDER=openai,deepseek,ollama' \
              'DATABASE_PATH=/app/data/looma.db' \
              'POETRY_CHROMA_PATH=/app/poetry_data' \
              'CHROMA_MODE=remote' \
              'CHROMA_HOST=chromadb' \
              'CHROMA_PORT=8000' \
              'RATE_LIMIT_STORAGE_URI=redis://redis:6379/1' \
              'DEPLOY_REGION=SG' \
              "CORS_ORIGINS=https://\${DOMAIN},https://www.\${DOMAIN},https://\${TSPACE_HOST},https://\${API_HOST},https://app.\${DOMAIN}" \
              "GOOGLE_REDIRECT_URI=https://\${API_HOST}/v1/auth/google/callback" \
              "GOOGLE_CLIENT_ID=${{ secrets.ENV_GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.ENV_GOOGLE_CLIENT_SECRET }}" \
              "STRIPE_SECRET_KEY=${{ secrets.ENV_STRIPE_SECRET_KEY }}" \
              "STRIPE_WEBHOOK_SECRET=${{ secrets.ENV_STRIPE_WEBHOOK_SECRET }}" \
              'STRIPE_CURRENCY=USD' \
              "STRIPE_SUCCESS_URL=https://\${DOMAIN}/pricing?status=success" \
              "STRIPE_CANCEL_URL=https://\${DOMAIN}/pricing?status=cancel" \
              'WECHAT_DEV_MODE=true' \
              > "\${ENV_FILE}"
          else
            echo "=== .env exists, normalize overseas keys ==="
          fi

          set_kv() {
            local key="\$1" val="\$2"
            [ -n "\${val}" ] || return 0
            if grep -q "^\${key}=" "\${ENV_FILE}"; then
              sed -i "s|^\${key}=.*|\${key}=\${val}|" "\${ENV_FILE}"
            else
              echo "\${key}=\${val}" >> "\${ENV_FILE}"
            fi
          }

          set_kv FLASK_PORT 5200
          set_kv DATABASE_PATH /app/data/looma.db
          set_kv POETRY_CHROMA_PATH /app/poetry_data
          set_kv CHROMA_MODE remote
          set_kv CHROMA_HOST chromadb
          set_kv CHROMA_PORT 8000
          set_kv RATE_LIMIT_STORAGE_URI redis://redis:6379/1
          set_kv DEPLOY_REGION SG
          set_kv CORS_ORIGINS "https://\${DOMAIN},https://www.\${DOMAIN},https://\${TSPACE_HOST},https://\${API_HOST},https://app.\${DOMAIN}"
          set_kv GOOGLE_REDIRECT_URI "https://\${API_HOST}/v1/auth/google/callback"
          set_kv JWT_SECRET "${{ env.ENV_JWT_SECRET }}"
          set_kv DEEPSEEK_API_KEY "${{ secrets.VULTR_DEEPSEEK_API_KEY || secrets.ENV_DEEPSEEK_API_KEY }}"
          set_kv DEEPSEEK_BASE_URL "https://api.deepseek.com/v1"
          set_kv DEEPSEEK_MODEL deepseek-chat
          set_kv QCC_AUTH_TOKEN "${{ secrets.VULTR_QCC_AUTH_TOKEN || secrets.ENV_QCC_AUTH_TOKEN }}"
          set_kv QCC_ENABLED true
          set_kv OPENAI_API_KEY "${{ secrets.ENV_OPENAI_API_KEY }}"
          set_kv GOOGLE_CLIENT_ID "${{ secrets.ENV_GOOGLE_CLIENT_ID }}"
          set_kv GOOGLE_CLIENT_SECRET "${{ secrets.ENV_GOOGLE_CLIENT_SECRET }}"
          set_kv STRIPE_SECRET_KEY "${{ secrets.ENV_STRIPE_SECRET_KEY }}"
          set_kv STRIPE_WEBHOOK_SECRET "${{ secrets.ENV_STRIPE_WEBHOOK_SECRET }}"
          set_kv STRIPE_SUCCESS_URL "https://\${DOMAIN}/pricing?status=success"
          set_kv STRIPE_CANCEL_URL "https://\${DOMAIN}/pricing?status=cancel"

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed. Run scripts/deploy-overseas.sh once on the VPS first." >&2
            exit 1
          fi

          echo "=== Bootstrap done ==="
          BOOTSTRAP

      - name: Sync code to server
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='backend/venv' \
            --exclude='backend/data' \
            --exclude='data/poetry_full' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/' \
            ./ \
            ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/

      - name: Sync poetry ChromaDB data
        run: |
          if [ -d "data/poetry_full" ]; then
            echo "=== Syncing poetry ChromaDB data ==="
            rsync -avz -e "$SSH_CMD" \
              data/poetry_full/ \
              ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/data/poetry_full/
          else
            echo "=== data/poetry_full/ not in repo — using server copy if present ==="
          fi

      - name: Deploy SaaS to tspace.genz.ltd
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            artifacts/saas/ \
            ${{ env.DEPLOY_TARGET }}:/var/www/saas/dist/
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "find /var/www/saas/dist -type f | wc -l"

      - name: Deploy nginx config
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'NGINX'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          DOMAIN="${{ env.OVERSEAS_DOMAIN }}"
          SSL_DIR="/etc/nginx/ssl"
          SRC="${DEPLOY_PATH}/docker/nginx.conf"
          if [ ! -f "${SRC}" ]; then
            echo "Missing ${SRC}" >&2
            exit 1
          fi

          # Origin TLS for Cloudflare Full mode (see scripts/deploy-overseas.sh)
          mkdir -p "${SSL_DIR}"
          if [ ! -f "${SSL_DIR}/fullchain.pem" ] || [ ! -f "${SSL_DIR}/privkey.pem" ]; then
            echo "=== Generating self-signed origin SSL (${SSL_DIR}) ==="
            if ! command -v openssl >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y openssl
            fi
            openssl req -x509 -nodes -days 3650 \
              -newkey rsa:2048 \
              -keyout "${SSL_DIR}/privkey.pem" \
              -out "${SSL_DIR}/fullchain.pem" \
              -subj "/C=SG/ST=Singapore/L=Singapore/O=Looma/CN=${DOMAIN}" \
              -addext "subjectAltName=DNS:${DOMAIN},DNS:*.${DOMAIN}"
            chmod 600 "${SSL_DIR}/privkey.pem"
          else
            echo "=== Origin SSL already present (${SSL_DIR}) ==="
          fi

          cp "${SRC}" /etc/nginx/nginx.conf
          # Stock Ubuntu snippets can conflict when we ship a full replacement nginx.conf
          rm -f /etc/nginx/sites-enabled/*

          if ! command -v nginx >/dev/null 2>&1; then
            apt-get update -y && apt-get install -y nginx
          fi
          if ! command -v lsof >/dev/null 2>&1; then
            apt-get update -y && apt-get install -y lsof
          fi
          mkdir -p /var/log/nginx /run/nginx /var/cache/nginx
          nginx -t

          echo "=== Stopping existing nginx and freeing :80 / :443 ==="
          systemctl stop nginx 2>/dev/null || true
          for port in 80 443; do
            for pid in $(lsof -t -i TCP:"${port}" -sTCP:LISTEN 2>/dev/null || true); do
              cmd=$(ps -p "${pid}" -o comm= 2>/dev/null || true)
              echo "=== Killing ${cmd} (pid ${pid}) on port ${port} ==="
              kill "${pid}" 2>/dev/null || kill -9 "${pid}" 2>/dev/null || true
            done
          done
          rm -f /run/nginx.pid /var/run/nginx.pid
          sleep 1
          echo "=== Listeners after cleanup ==="
          ss -tlnp 2>/dev/null | grep -E ':80|:443' || echo "(none)"

          systemctl enable nginx
          systemctl reset-failed nginx 2>/dev/null || true
          if systemctl is-active --quiet nginx; then
            systemctl reload nginx || true
          else
            systemctl start nginx || true
          fi
          if ! systemctl is-active --quiet nginx; then
            echo "=== nginx failed to start — diagnostics ==="
            nginx -t || true
            systemctl status nginx --no-pager -l || true
            journalctl -u nginx.service -n 80 --no-pager || true
            tail -n 40 /var/log/nginx/error.log 2>/dev/null || true
            ss -tlnp 2>/dev/null | grep -E ':80|:443' || netstat -tlnp 2>/dev/null | grep -E ':80|:443' || true
            exit 1
          fi
          echo "=== Nginx running (overseas) ==="
          NGINX

      - name: Build & restart Docker stack
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'DOCKER'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          COMPOSE="docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml -p looma-zervi"
          COMPOSE_FILE="${DEPLOY_PATH}/docker/docker-compose.yml"

          for proj in looma-zervi docker; do
            docker compose -f "${COMPOSE_FILE}" -p "${proj}" down --remove-orphans 2>/dev/null || true
          done
          docker rm -f looma-backend looma-chromadb looma-redis 2>/dev/null || true

          if command -v lsof >/dev/null 2>&1; then
            for pid in $(lsof -t -i :5200 2>/dev/null || true); do
              cmd=$(ps -p "$pid" -o comm= 2>/dev/null || true)
              if [ "$cmd" != "docker-proxy" ]; then
                kill "$pid" 2>/dev/null || true
              fi
            done
          fi
          sleep 2

          VOLUME_NAME="looma-zervi_poetry-data"
          if ! docker run --rm -v ${VOLUME_NAME}:/data alpine test -f /data/chroma.sqlite3 2>/dev/null; then
            if [ -d "${DEPLOY_PATH}/data/poetry_full" ]; then
              docker run --rm \
                -v ${VOLUME_NAME}:/dest \
                -v ${DEPLOY_PATH}/data/poetry_full:/src:ro \
                alpine cp -a /src/. /dest/
              echo "=== Poetry volume populated ==="
            fi
          fi

          cd "${DEPLOY_PATH}/docker"
          HASH=$(sha256sum "${DEPLOY_PATH}/backend/requirements.txt" "${DEPLOY_PATH}/docker/Dockerfile.backend" | sha256sum | awk '{print $1}')
          MARKER="/tmp/looma-backend-image.hash"
          NEED_BUILD=1
          if [ -f "${MARKER}" ] && [ "$(cat "${MARKER}")" = "${HASH}" ]; then
            if docker image inspect looma-zervi-backend:latest >/dev/null 2>&1; then
              NEED_BUILD=0
              echo "=== Backend image up-to-date, skip rebuild ==="
            fi
          fi
          if [ "${NEED_BUILD}" = "1" ]; then
            echo "=== Build backend image ==="
            DOCKER_BUILDKIT=1 ${COMPOSE} build backend
            echo "${HASH}" > "${MARKER}"
          fi

          ${COMPOSE} up -d --remove-orphans --force-recreate --no-build backend redis chromadb

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5200/health >/dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:5200/health || { ${COMPOSE} logs --tail 40 backend; exit 1; }
          DOCKER

      - name: Health check (local)
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'HEALTH'
          set -euo pipefail
          echo "=== Backend :5200 ==="
          curl -sf http://127.0.0.1:5200/health
          echo ""
          echo "=== Nginx api host /health ==="
          curl -sf -H "Host: api.genz.ltd" http://127.0.0.1/health
          echo ""
          HEALTH

      - name: Public health check
        run: |
          echo "=== Public https://api.genz.ltd/health ==="
          curl -sf --connect-timeout 20 "https://api.genz.ltd/health"
          echo ""
          echo "=== CORS for tspace.genz.ltd (informational) ==="
          CORS_HDR=$(curl -sf -D - -o /dev/null -X POST "https://api.genz.ltd/v1/auth/login" \
            -H "Content-Type: application/json" \
            -H "Origin: https://tspace.genz.ltd" \
            -d '{"email":"beta_free@looma.test","password":"looma123"}' | grep -i access-control-allow-origin || true)
          if [ -n "$CORS_HDR" ]; then
            echo "$CORS_HDR"
          else
            echo "WARN: no CORS header for tspace (SaaS uses same-origin /v1 proxy)"
          fi
          echo ""
          echo "=== tspace same-origin login proxy ==="
          curl -sf -X POST "https://tspace.genz.ltd/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"beta_free@looma.test","password":"looma123"}' | head -c 80
          echo ""
          echo "=== Public https://genz.ltd/ (first bytes) ==="
          curl -sf --connect-timeout 20 "https://genz.ltd/" | head -c 120
          echo ""
          echo "=== Public https://tspace.genz.ltd/register (first bytes) ==="
          curl -sf --connect-timeout 20 "https://tspace.genz.ltd/register" | head -c 120
          echo ""

      - name: Clean up old images
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "docker image prune -f"
