# ============================================================
# Deploy Overseas — push release/overseas 后自动部署到 Vultr 新加坡
#
# 目标机默认: 139.180.184.25 (root, /opt/looma-zervi)
# 域名: genz.ltd + Cloudflare (Nginx 使用 docker/nginx.conf)
#
# GitHub Secrets（必填）:
#   SSH_HOST_SG            - 139.180.184.25
#   SSH_USER_SG            - root
#   SSH_PRIVATE_KEY_SG     - github-actions-overseas 私钥全文
#   ENV_JWT_SECRET_SG      - 海外 JWT（≥32 字符，与大陆独立）
#
# GitHub Secrets（建议）:
#   ENV_DEEPSEEK_API_KEY
#   ENV_OPENAI_API_KEY
#   ENV_GOOGLE_CLIENT_ID / ENV_GOOGLE_CLIENT_SECRET
#   ENV_STRIPE_SECRET_KEY / ENV_STRIPE_WEBHOOK_SECRET
#
# Repository Variables（可选）:
#   DEPLOY_PATH_SG         - 默认 /opt/looma-zervi
# ============================================================
name: Deploy Overseas

on:
  push:
    branches: [release/overseas]
  workflow_dispatch:

concurrency:
  group: deploy-overseas
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH_SG != '' && vars.DEPLOY_PATH_SG || '/opt/looma-zervi' }}
  OVERSEAS_DOMAIN: genz.ltd
  OVERSEAS_API_HOST: api.genz.ltd

jobs:
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
          DEPLOY_REGION: SG
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: "Deploy to Vultr SG"
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_SG }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST_SG }} >> ~/.ssh/known_hosts

      - name: Setup SSH env
        run: |
          echo 'SSH_CMD=ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=accept-new' >> $GITHUB_ENV
          echo "DEPLOY_TARGET=${{ secrets.SSH_USER_SG }}@${{ secrets.SSH_HOST_SG }}" >> $GITHUB_ENV

      - name: Bootstrap server
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << BOOTSTRAP
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          DOMAIN="${{ env.OVERSEAS_DOMAIN }}"
          API_HOST="${{ env.OVERSEAS_API_HOST }}"
          TSPACE_HOST="tspace.${DOMAIN}"

          echo "=== Bootstrap overseas server (DEPLOY_PATH=\${DEPLOY_PATH}) ==="
          mkdir -p "\${DEPLOY_PATH}" /var/www/genz-web "\${DEPLOY_PATH}/data" "\${DEPLOY_PATH}/logs" "\${DEPLOY_PATH}/data/chroma_models"

          ENV_FILE="\${DEPLOY_PATH}/backend/.env"
          mkdir -p "\$(dirname "\${ENV_FILE}")"
          if [ ! -f "\${ENV_FILE}" ]; then
            echo "=== Creating backend/.env (overseas template) ==="
            printf '%s\n' \
              '# Auto-generated by GitHub Actions (overseas)' \
              'FLASK_ENV=production' \
              'FLASK_PORT=5200' \
              "JWT_SECRET=${{ secrets.ENV_JWT_SECRET_SG }}" \
              "DEEPSEEK_API_KEY=${{ secrets.ENV_DEEPSEEK_API_KEY }}" \
              'DEEPSEEK_BASE_URL=https://api.deepseek.com/v1' \
              "OPENAI_API_KEY=${{ secrets.ENV_OPENAI_API_KEY }}" \
              'OPENAI_BASE_URL=https://api.openai.com/v1' \
              'OPENAI_MODEL=gpt-4o-mini' \
              'LLM_PROVIDER_ORDER=openai,deepseek,ollama' \
              'DATABASE_PATH=/app/data/looma.db' \
              'POETRY_CHROMA_PATH=/app/poetry_data' \
              'CHROMA_MODE=remote' \
              'CHROMA_HOST=chromadb' \
              'CHROMA_PORT=8000' \
              'RATE_LIMIT_STORAGE_URI=redis://redis:6379/1' \
              'DEPLOY_REGION=SG' \
              "CORS_ORIGINS=https://\${DOMAIN},https://www.\${DOMAIN},https://\${TSPACE_HOST},https://\${API_HOST}" \
              "GOOGLE_REDIRECT_URI=https://\${API_HOST}/v1/auth/google/callback" \
              "GOOGLE_CLIENT_ID=${{ secrets.ENV_GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.ENV_GOOGLE_CLIENT_SECRET }}" \
              "STRIPE_SECRET_KEY=${{ secrets.ENV_STRIPE_SECRET_KEY }}" \
              "STRIPE_WEBHOOK_SECRET=${{ secrets.ENV_STRIPE_WEBHOOK_SECRET }}" \
              'STRIPE_CURRENCY=USD' \
              "STRIPE_SUCCESS_URL=https://\${DOMAIN}/pricing?status=success" \
              "STRIPE_CANCEL_URL=https://\${DOMAIN}/pricing?status=cancel" \
              'WECHAT_DEV_MODE=true' \
              > "\${ENV_FILE}"
          else
            echo "=== .env exists, normalize overseas keys ==="
          fi

          set_kv() {
            local key="\$1" val="\$2"
            [ -n "\${val}" ] || return 0
            if grep -q "^\${key}=" "\${ENV_FILE}"; then
              sed -i "s|^\${key}=.*|\${key}=\${val}|" "\${ENV_FILE}"
            else
              echo "\${key}=\${val}" >> "\${ENV_FILE}"
            fi
          }

          set_kv FLASK_PORT 5200
          set_kv DATABASE_PATH /app/data/looma.db
          set_kv POETRY_CHROMA_PATH /app/poetry_data
          set_kv CHROMA_MODE remote
          set_kv CHROMA_HOST chromadb
          set_kv CHROMA_PORT 8000
          set_kv RATE_LIMIT_STORAGE_URI redis://redis:6379/1
          set_kv DEPLOY_REGION SG
          set_kv CORS_ORIGINS "https://\${DOMAIN},https://www.\${DOMAIN},https://\${TSPACE_HOST},https://\${API_HOST}"
          set_kv GOOGLE_REDIRECT_URI "https://\${API_HOST}/v1/auth/google/callback"
          set_kv JWT_SECRET "${{ secrets.ENV_JWT_SECRET_SG }}"
          set_kv DEEPSEEK_API_KEY "${{ secrets.ENV_DEEPSEEK_API_KEY }}"
          set_kv OPENAI_API_KEY "${{ secrets.ENV_OPENAI_API_KEY }}"
          set_kv GOOGLE_CLIENT_ID "${{ secrets.ENV_GOOGLE_CLIENT_ID }}"
          set_kv GOOGLE_CLIENT_SECRET "${{ secrets.ENV_GOOGLE_CLIENT_SECRET }}"
          set_kv STRIPE_SECRET_KEY "${{ secrets.ENV_STRIPE_SECRET_KEY }}"
          set_kv STRIPE_WEBHOOK_SECRET "${{ secrets.ENV_STRIPE_WEBHOOK_SECRET }}"
          set_kv STRIPE_SUCCESS_URL "https://\${DOMAIN}/pricing?status=success"
          set_kv STRIPE_CANCEL_URL "https://\${DOMAIN}/pricing?status=cancel"

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed. Run scripts/deploy-overseas.sh once on the VPS first." >&2
            exit 1
          fi

          echo "=== Bootstrap done ==="
          BOOTSTRAP

      - name: Sync code to server
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='backend/venv' \
            --exclude='backend/data' \
            --exclude='data/poetry_full' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/' \
            ./ \
            ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/

      - name: Sync poetry ChromaDB data
        run: |
          if [ -d "data/poetry_full" ]; then
            echo "=== Syncing poetry ChromaDB data ==="
            rsync -avz -e "$SSH_CMD" \
              data/poetry_full/ \
              ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/data/poetry_full/
          else
            echo "=== data/poetry_full/ not in repo — using server copy if present ==="
          fi

      - name: Deploy genz-web static site
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'GENZ'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          SRC="${DEPLOY_PATH}/frontend/packages/genz-web"
          DEST="/var/www/genz-web"
          mkdir -p "${DEST}"
          rsync -a --delete \
            --exclude README.md \
            --exclude package.json \
            --exclude vercel.json \
            "${SRC}/" "${DEST}/"
          echo "genz-web deployed ($(find "${DEST}" -type f | wc -l) files)"
          GENZ

      - name: Deploy nginx config
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'NGINX'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          SRC="${DEPLOY_PATH}/docker/nginx.conf"
          if [ ! -f "${SRC}" ]; then
            echo "Missing ${SRC}" >&2
            exit 1
          fi
          cp "${SRC}" /etc/nginx/nginx.conf
          nginx -t
          systemctl reload nginx || systemctl restart nginx
          echo "=== Nginx reloaded (overseas) ==="
          NGINX

      - name: Build & restart Docker stack
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'DOCKER'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          COMPOSE="docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml -p looma-zervi"
          COMPOSE_FILE="${DEPLOY_PATH}/docker/docker-compose.yml"

          for proj in looma-zervi docker; do
            docker compose -f "${COMPOSE_FILE}" -p "${proj}" down --remove-orphans 2>/dev/null || true
          done
          docker rm -f looma-backend looma-chromadb looma-redis 2>/dev/null || true

          if command -v lsof >/dev/null 2>&1; then
            for pid in $(lsof -t -i :5200 2>/dev/null || true); do
              cmd=$(ps -p "$pid" -o comm= 2>/dev/null || true)
              if [ "$cmd" != "docker-proxy" ]; then
                kill "$pid" 2>/dev/null || true
              fi
            done
          fi
          sleep 2

          VOLUME_NAME="looma-zervi_poetry-data"
          if ! docker run --rm -v ${VOLUME_NAME}:/data alpine test -f /data/chroma.sqlite3 2>/dev/null; then
            if [ -d "${DEPLOY_PATH}/data/poetry_full" ]; then
              docker run --rm \
                -v ${VOLUME_NAME}:/dest \
                -v ${DEPLOY_PATH}/data/poetry_full:/src:ro \
                alpine cp -a /src/. /dest/
              echo "=== Poetry volume populated ==="
            fi
          fi

          cd "${DEPLOY_PATH}/docker"
          HASH=$(sha256sum "${DEPLOY_PATH}/backend/requirements.txt" "${DEPLOY_PATH}/docker/Dockerfile.backend" | sha256sum | awk '{print $1}')
          MARKER="/tmp/looma-backend-image.hash"
          NEED_BUILD=1
          if [ -f "${MARKER}" ] && [ "$(cat "${MARKER}")" = "${HASH}" ]; then
            if docker image inspect looma-zervi-backend:latest >/dev/null 2>&1; then
              NEED_BUILD=0
              echo "=== Backend image up-to-date, skip rebuild ==="
            fi
          fi
          if [ "${NEED_BUILD}" = "1" ]; then
            echo "=== Build backend image ==="
            DOCKER_BUILDKIT=1 ${COMPOSE} build backend
            echo "${HASH}" > "${MARKER}"
          fi

          ${COMPOSE} up -d --remove-orphans --force-recreate --no-build backend redis chromadb

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5200/health >/dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:5200/health || { ${COMPOSE} logs --tail 40 backend; exit 1; }
          DOCKER

      - name: Health check (local)
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'HEALTH'
          set -euo pipefail
          echo "=== Backend :5200 ==="
          curl -sf http://127.0.0.1:5200/health
          echo ""
          echo "=== Nginx api host /health ==="
          curl -sf -H "Host: api.genz.ltd" http://127.0.0.1/health
          echo ""
          HEALTH

      - name: Public health check
        run: |
          echo "=== Public https://api.genz.ltd/health ==="
          curl -sf --connect-timeout 20 "https://api.genz.ltd/health"
          echo ""
          echo "=== Public https://genz.ltd/ (first bytes) ==="
          curl -sf --connect-timeout 20 "https://genz.ltd/" | head -c 120
          echo ""

      - name: Clean up old images
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "docker image prune -f"
