# ============================================================
# Deploy Overseas — tag 触发部署到 Vultr 新加坡
#
# 目标机: 139.180.184.25 (Vultr Singapore)
# 域名:   api.genz.ltd (Cloudflare → Vultr :80)
# 前端:   genz.ltd (Vercel 自动部署，此 workflow 不处理)
#
# 触发方式:
#   1. 推送 tag 匹配 overseas-* (例: overseas-v1.1, overseas-20260714)
#   2. 手动 workflow_dispatch
#
# GitHub Secrets (必填):
#   VULTR_SSH_HOST          - 139.180.184.25
#   VULTR_SSH_USER          - root (或 ubuntu)
#   VULTR_SSH_PRIVATE_KEY   - SSH 私钥全文
#   VULTR_JWT_SECRET        - JWT 签名密钥 (>=32 字符)
#   VULTR_DEEPSEEK_API_KEY  - DeepSeek API Key
#
# GitHub Secrets (可选，有默认值):
#   VULTR_DEPLOY_PATH       - 默认 /opt/looma-zervi
#   VULTR_DEEPSEEK_BASE_URL - 默认 https://api.deepseek.com/v1
#
# 前置条件:
#   - Vultr 服务器已安装 Docker + Docker Compose
#   - SSH 公钥已添加到服务器 authorized_keys
#   - Cloudflare DNS: api.genz.ltd → 139.180.184.25 (Proxied)
#   - Cloudflare SSL: Full (不加密到源站) 或 Flexible
# ============================================================
name: Deploy Overseas

on:
  push:
    tags:
      - 'overseas-*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip backend tests (faster deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-overseas
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ secrets.VULTR_DEPLOY_PATH != '' && secrets.VULTR_DEPLOY_PATH || '/opt/looma-zervi' }}
  DEEPSEEK_BASE_URL: ${{ secrets.VULTR_DEEPSEEK_BASE_URL != '' && secrets.VULTR_DEEPSEEK_BASE_URL || 'https://api.deepseek.com/v1' }}

jobs:
  # ============================================
  # 后端测试 (可跳过)
  # ============================================
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
        run: python -m pytest tests/ -v --tb=short

  # ============================================
  # Docker 构建验证
  # ============================================
  docker-build-check:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t looma-backend:overseas-check \
            backend/

  # ============================================
  # 部署到 Vultr 新加坡
  # ============================================
  deploy:
    name: "Deploy to Vultr Singapore"
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: always() && (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    environment: overseas

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VULTR_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH env
        run: |
          echo 'SSH_CMD=ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=accept-new' >> $GITHUB_ENV
          echo "DEPLOY_TARGET=${{ secrets.VULTR_SSH_USER }}@${{ secrets.VULTR_SSH_HOST }}" >> $GITHUB_ENV

      - name: Bootstrap server
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << BOOTSTRAP
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          echo "=== Bootstrap Vultr server (DEPLOY_PATH=\${DEPLOY_PATH}) ==="

          # Install Docker if missing
          if ! command -v docker >/dev/null 2>&1; then
            echo "=== Installing Docker ==="
            curl -fsSL https://get.docker.com | sh
            systemctl enable docker
            systemctl start docker
          fi

          # Create directories
          mkdir -p "\${DEPLOY_PATH}" "\${DEPLOY_PATH}/data" "\${DEPLOY_PATH}/logs"
          mkdir -p "\${DEPLOY_PATH}/data/chroma_models"

          # Ensure .env exists with overseas config
          ENV_FILE="\${DEPLOY_PATH}/backend/.env"
          mkdir -p "\$(dirname "\${ENV_FILE}")"
          if [ ! -f "\${ENV_FILE}" ]; then
            echo "=== Creating backend/.env for overseas ==="
            printf '%s\n' \
              '# Auto-generated by GitHub Actions (overseas deploy)' \
              'FLASK_ENV=production' \
              'FLASK_PORT=5200' \
              "JWT_SECRET=${{ secrets.VULTR_JWT_SECRET }}" \
              "DEEPSEEK_API_KEY=${{ secrets.VULTR_DEEPSEEK_API_KEY }}" \
              "DEEPSEEK_BASE_URL=${{ env.DEEPSEEK_BASE_URL }}" \
              'DEEPSEEK_MODEL=deepseek-chat' \
              'DATABASE_PATH=/app/data/looma.db' \
              'POETRY_CHROMA_PATH=/app/poetry_data' \
              'CHROMA_MODE=remote' \
              'CHROMA_HOST=chromadb' \
              'CHROMA_PORT=8000' \
              'WECHAT_DEV_MODE=true' \
              'CORS_ORIGINS=https://genz.ltd,https://www.genz.ltd,https://app.genz.ltd' \
              > "\${ENV_FILE}"
            echo "=== .env created ==="
          else
            echo "=== .env already exists, normalizing paths ==="
          fi

          # Normalize key config values
          set_kv() {
            local key="\$1" val="\$2"
            if grep -q "^\${key}=" "\${ENV_FILE}"; then
              sed -i "s|^\${key}=.*|\${key}=\${val}|" "\${ENV_FILE}"
            else
              echo "\${key}=\${val}" >> "\${ENV_FILE}"
            fi
          }
          set_kv FLASK_PORT 5200
          set_kv DATABASE_PATH /app/data/looma.db
          set_kv POETRY_CHROMA_PATH /app/poetry_data
          set_kv CHROMA_MODE remote
          set_kv CHROMA_HOST chromadb
          set_kv CHROMA_PORT 8000
          set_kv CORS_ORIGINS https://genz.ltd,https://www.genz.ltd,https://app.genz.ltd

          echo "=== Bootstrap done ==="
          BOOTSTRAP

      - name: Sync code to server
        run: |
          rsync -avz -e "$SSH_CMD" --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='backend/venv' \
            --exclude='backend/.venv' \
            --exclude='backend/data' \
            --exclude='data/poetry_full' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='.pnpm-store' \
            --exclude='.workbuddy' \
            --exclude='.idea' \
            --exclude='.pytest_cache' \
            ./ \
            ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/

      - name: Sync poetry ChromaDB data (if exists locally)
        run: |
          if [ -d "data/poetry_full" ]; then
            echo "=== Syncing poetry ChromaDB data ==="
            rsync -avz -e "$SSH_CMD" \
              data/poetry_full/ \
              ${{ env.DEPLOY_TARGET }}:${{ env.DEPLOY_PATH }}/data/poetry_full/
          else
            echo "=== data/poetry_full/ not in repo — using server copy if present ==="
          fi

      - name: Deploy nginx config
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'NGINX'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          NGINX_SRC="\${DEPLOY_PATH}/nginx-vultr.conf"

          if [ ! -f "\${NGINX_SRC}" ]; then
            echo "Missing \${NGINX_SRC}, skipping nginx config"
            exit 0
          fi

          # Install nginx if missing
          if ! command -v nginx >/dev/null 2>&1; then
            echo "=== Installing nginx ==="
            apt-get update -qq && apt-get install -y -qq nginx
          fi

          # Vultr uses a monolithic nginx.conf (not sites-enabled/*.conf),
          # so we deploy the full config directly.
          sudo cp "\${NGINX_SRC}" /etc/nginx/nginx.conf

          # Allow port 80 through firewall
          if command -v ufw >/dev/null 2>&1; then sudo ufw allow 80/tcp 2>/dev/null || true; fi

          sudo nginx -t
          sudo nginx -s reload || sudo nginx
          echo "=== Nginx reloaded (monolithic nginx.conf for api.genz.ltd) ==="
          NGINX

      - name: Build & restart Docker backend
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'DOCKER'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          COMPOSE="docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml -p looma-zervi"
          COMPOSE_FILE="${DEPLOY_PATH}/docker/docker-compose.yml"

          echo "=== Stop legacy containers ==="
          docker rm -f looma-backend looma-chromadb 2>/dev/null || true
          ${COMPOSE} down --remove-orphans 2>/dev/null || true

          echo "=== Free port 5200 (native gunicorn if running) ==="
          if command -v lsof >/dev/null 2>&1; then
            for pid in $(lsof -t -i :5200 2>/dev/null || true); do
              cmd=$(ps -p "$pid" -o comm= 2>/dev/null || true)
              if [ "$cmd" != "docker-proxy" ]; then
                kill "$pid" 2>/dev/null || sudo kill "$pid" 2>/dev/null || true
              fi
            done
          fi
          sleep 2

          echo "=== Populate poetry Docker volume if empty ==="
          VOLUME_NAME="looma-zervi_poetry-data"
          if ! docker run --rm -v ${VOLUME_NAME}:/data alpine test -f /data/chroma.sqlite3 2>/dev/null; then
            if [ -d "${DEPLOY_PATH}/data/poetry_full" ]; then
              docker run --rm \
                -v ${VOLUME_NAME}:/dest \
                -v ${DEPLOY_PATH}/data/poetry_full:/src:ro \
                alpine cp -a /src/. /dest/
              echo "=== Poetry volume populated ==="
            else
              echo "=== No poetry source on server, skip volume init ==="
            fi
          fi

          cd "${DEPLOY_PATH}/docker"

          # Smart rebuild: only rebuild if requirements.txt or Dockerfile changed
          HASH=$(sha256sum "${DEPLOY_PATH}/backend/requirements.txt" "${DEPLOY_PATH}/docker/Dockerfile.backend" | sha256sum | awk '{print $1}')
          MARKER="/tmp/looma-backend-image.hash"
          NEED_BUILD=1
          if [ -f "${MARKER}" ] && [ "$(cat "${MARKER}")" = "${HASH}" ]; then
            if docker image inspect looma-zervi-backend:latest >/dev/null 2>&1; then
              NEED_BUILD=0
              echo "=== Backend image up-to-date, skip rebuild ==="
            fi
          fi
          if [ "${NEED_BUILD}" = "1" ]; then
            echo "=== Build backend image ==="
            DOCKER_BUILDKIT=1 ${COMPOSE} build backend
            echo "${HASH}" > "${MARKER}"
          fi

          echo "=== Start / recreate containers ==="
          ${COMPOSE} up -d --remove-orphans --force-recreate --no-build backend
          ${COMPOSE} up -d --no-build chromadb

          echo "=== Wait for backend health ==="
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5200/health >/dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:5200/health || { ${COMPOSE} logs --tail 40 backend; exit 1; }
          DOCKER

      - name: Import poetry into SQLite (first run only)
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'POETRY_IMPORT'
          set -euo pipefail
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          COMPOSE="docker compose -f ${DEPLOY_PATH}/docker/docker-compose.yml -p looma-zervi"

          COUNT=$(${COMPOSE} exec -T backend \
            python -c "from src.db.manager import DatabaseManager; db=DatabaseManager('/app/data/looma.db'); db.init_schema(); print(db.get_poetry_stats()['total'])" 2>/dev/null || echo "0")

          if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
            echo "=== Poems table already has ${COUNT} entries, skipping import ==="
            exit 0
          fi

          echo "=== Running poetry import (ChromaDB -> SQLite) ==="
          ${COMPOSE} exec -T backend \
            python scripts/import_poetry.py \
              --source-dir /app/poetry_data \
              --db-path /app/data/looma.db \
              --batch-size 1000
          echo "=== Poetry import complete ==="
          POETRY_IMPORT

      - name: Health check (local via nginx)
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "bash -s" << 'HEALTH'
          set -euo pipefail
          echo "=== Backend :5200 ==="
          curl -sf http://127.0.0.1:5200/health
          echo ""
          echo "=== Nginx :80 /health ==="
          curl -sf -H "Host: api.genz.ltd" http://127.0.0.1/health
          echo ""
          echo "=== Poetry stats ==="
          curl -sf -H "Host: api.genz.ltd" http://127.0.0.1/v1/poetry/stats | head -c 200
          echo ""
          HEALTH

      - name: Public health check (via Cloudflare)
        run: |
          echo "=== Public https://api.genz.ltd/health ==="
          curl -sf --connect-timeout 15 "https://api.genz.ltd/health"
          echo ""

      - name: Clean up old images
        run: |
          $SSH_CMD ${{ env.DEPLOY_TARGET }} "docker image prune -f"

      - name: Deployment summary
        if: always()
        run: |
          echo "========================================"
          echo "  Overseas deployment summary"
          echo "========================================"
          echo "  Tag:        ${{ github.ref_name }}"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Server:     ${{ secrets.VULTR_SSH_HOST }} (Vultr Singapore)"
          echo "  Deploy URL: https://api.genz.ltd"
          echo "  Frontend:   https://genz.ltd (Vercel auto-deploy)"
          echo "  Health:     https://api.genz.ltd/health"
          echo "========================================"