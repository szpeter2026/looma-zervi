# ============================================================
# CI — PR 检查流水线
# 在每次 PR 打开/更新时运行：类型检查 + 测试
# ============================================================
name: CI

on:
  pull_request:
    branches: [main, refactor/framework-v2]
  push:
    branches: [refactor/framework-v2]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 前端：类型检查
  # ============================================
  frontend-typecheck:
    name: "Frontend Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Typecheck shared-core
        run: pnpm --filter @looma/shared-core typecheck

      - name: Typecheck planetx
        run: pnpm --filter @looma/planetx typecheck

      - name: Typecheck saas
        run: pnpm --filter @looma/saas typecheck

  # ============================================
  # 后端：单元测试
  # ============================================
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          JWT_SECRET: ci-test-secret
          WECHAT_DEV_MODE: "true"
          WECHAT_APPID: test_appid
          WECHAT_SECRET: test_secret
          DEEPSEEK_API_KEY: skip
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
        run: python -m pytest tests/ -v --tb=short

  # ============================================
  # Docker 构建验证（仅验证可构建，不推送）
  # ============================================
  docker-build-check:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t looma-backend:ci-test \
            backend/
