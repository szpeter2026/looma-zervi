# Looma-Zervi 前端部署 Nginx 配置
# 部署到 /etc/nginx/sites-enabled/looma-zervi
# ICP 备案后替换 server_name 为正式域名

server {
    listen 80;
    server_name _;  # 接受所有域名/IP

    # 静态文件根目录（与 GitHub Actions 上传目录 artifacts/planetx/ 对应）
    root /var/www/planetx/dist;

    # ===== Backend API =====
    location /v1/ {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Safety net: /api/v1/... → /v1/... (rewrite for any frontend code using /api prefix)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
    }

    # ===== T 空间 (SaaS) SPA =====
    # 与 GitHub Actions 上传目录 artifacts/saas/ 对应
    location /tspace/ {
        alias /var/www/saas/dist/;
        try_files $uri $uri/ /tspace/index.html;
    }

    # ===== PlanetX SPA (默认入口) =====
    location / {
        try_files $uri $uri/ /index.html;
    }
}
